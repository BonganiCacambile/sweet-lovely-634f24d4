name: Regression — Extras Pricing Consistency

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  extras-pricing:
    name: extras-pricing-consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The regression script is pure Node — no dev server, no browser, no
      # network. Install only to satisfy `bun run` script resolution.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run extras pricing regression
        run: bun run test:regression:extras-pricing